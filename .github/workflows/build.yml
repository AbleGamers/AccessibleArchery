# Cloud builds + Windows smoke test (Godot's answer to Unity Cloud Build).
#
# On every push/PR:
#   1. export  (Linux runner)  — exports the Windows exe (with the same preset
#      used locally), assembles the USB-ready booth package, AND exports an
#      unsigned macOS build for testers; all uploaded as downloadable artifacts
#      (repo → Actions → run → Artifacts).
#   2. smoke-test-windows (real Windows runner) — runs the actual exe in the
#      station and server roles and fails the build if either crashes on boot
#      or the server banner never appears. No GPU on runners, so this proves
#      the build *runs correctly* on Windows; final visual check still wants
#      human eyes on real hardware once.
name: Build & smoke test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  GODOT_VERSION: "4.7"

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot and export templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-stable

      - name: Download Godot + export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/godot ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          curl -sL -o /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d ~/godot
          curl -sL -o /tmp/templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Import project (builds the global class cache)
        run: |
          ~/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --path . --editor --quit-after 200 || true

      - name: Export Windows build
        run: |
          set -euo pipefail
          mkdir -p build/windows
          ~/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --path . --export-release "Windows" build/windows/AccessibleArchery.exe
          test -f build/windows/AccessibleArchery.exe

      - name: Assemble booth package
        run: bash booth/make-windows-package.sh

      - name: Upload booth package (USB-ready zip)
        uses: actions/upload-artifact@v4
        with:
          name: AccessibleArchery-booth-windows
          path: build/AccessibleArchery-booth-windows.zip
          if-no-files-found: error

      - name: Upload bare Windows exe (for the smoke test)
        uses: actions/upload-artifact@v4
        with:
          name: AccessibleArchery-windows-exe
          path: build/windows/AccessibleArchery.exe
          if-no-files-found: error

      # macOS export uses the unsigned "macOS Test" preset (codesign off) so it
      # exports here on Linux. Testers unzip and right-click → Open (Gatekeeper
      # warns once on an unsigned app). Signed/public builds use the "macOS"
      # preset on a Mac.
      - name: Export macOS build (unsigned, for testers)
        run: |
          set -euo pipefail
          mkdir -p build/macos
          ~/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 --headless --path . --export-release "macOS Test" build/macos/AccessibleArchery-macos.zip
          test -f build/macos/AccessibleArchery-macos.zip

      - name: Upload macOS build (unsigned zip)
        uses: actions/upload-artifact@v4
        with:
          name: AccessibleArchery-macos
          path: build/macos/AccessibleArchery-macos.zip
          if-no-files-found: error

  smoke-test-windows:
    needs: export
    runs-on: windows-latest
    steps:
      - name: Download the exe
        uses: actions/download-artifact@v4
        with:
          name: AccessibleArchery-windows-exe

      - name: Boot the game (station role, headless)
        shell: pwsh
        run: |
          $log = Join-Path $PWD "station.log"
          $p = Start-Process -FilePath ".\AccessibleArchery.exe" -ArgumentList "--headless","--log-file",$log,"--","--station" -PassThru
          Start-Sleep -Seconds 20
          if ($p.HasExited) {
            if (Test-Path $log) { Get-Content $log }
            throw "Station role exited early (code $($p.ExitCode))"
          }
          Stop-Process -Id $p.Id -Force
          if (Test-Path $log) { Get-Content $log }
          Write-Host "Station role: booted and stayed up. OK"

      - name: Run the leaderboard server role
        shell: pwsh
        run: |
          $log = Join-Path $PWD "server.log"
          $p = Start-Process -FilePath ".\AccessibleArchery.exe" -ArgumentList "--headless","--log-file",$log,"--","--server" -PassThru
          Start-Sleep -Seconds 20
          if ($p.HasExited) {
            if (Test-Path $log) { Get-Content $log }
            throw "Server role exited early (code $($p.ExitCode))"
          }
          $text = ""
          if (Test-Path $log) { $text = Get-Content $log -Raw }
          Stop-Process -Id $p.Id -Force
          if (Test-Path $log) { Get-Content $log }
          if ($text -notmatch "leaderboard server") {
            throw "Server banner not found in log — server did not start correctly"
          }
          Write-Host "Server role: booted, banner present. OK"

  # Pushing a tag like v0.2.0 publishes a public Release with the booth zip
  # attached — the shareable download for booth staff and the public:
  #   git tag v0.2.0 && git push --tags
  # Only runs after the Windows smoke test passes.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [export, smoke-test-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download booth package
        uses: actions/download-artifact@v4
        with:
          name: AccessibleArchery-booth-windows

      - name: Publish release with booth zip attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" AccessibleArchery-booth-windows.zip \
            --repo "$GITHUB_REPOSITORY" --generate-notes \
            --title "Accessible Archery $GITHUB_REF_NAME" \
          || gh release upload "$GITHUB_REF_NAME" AccessibleArchery-booth-windows.zip \
            --repo "$GITHUB_REPOSITORY" --clobber
