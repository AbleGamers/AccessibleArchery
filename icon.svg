<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
	<!-- Accessible Archery: a World Archery target face with an arrow in the gold. -->
	<rect width="128" height="128" rx="26" fill="#16354e"/>
	<circle cx="60" cy="66" r="48" fill="#efefe9"/>
	<circle cx="60" cy="66" r="38.5" fill="#1f1f24"/>
	<circle cx="60" cy="66" r="29" fill="#0087bd"/>
	<circle cx="60" cy="66" r="19.5" fill="#d6281e"/>
	<circle cx="60" cy="66" r="10" fill="#ffd52e"/>
	<circle cx="60" cy="66" r="3.5" fill="none" stroke="#c79f00" stroke-width="1.6"/>
	<!-- Arrow: shaft from the top-right corner into the gold. -->
	<g stroke-linecap="round">
		<line x1="112" y1="14" x2="66" y2="60" stroke="#7a4a1f" stroke-width="6"/>
		<line x1="112" y1="14" x2="66" y2="60" stroke="#e8c87a" stroke-width="2.4"/>
		<!-- Fletching -->
		<path d="M112 14 L118 30 L106 24 Z" fill="#d6281e"/>
		<path d="M112 14 L96 8 L104 20 Z" fill="#efefe9"/>
	</g>
	<!-- Arrowhead buried at the impact point -->
	<path d="M66 60 L76 54 L72 64 Z" fill="#3d3d44"/>
</svg>
