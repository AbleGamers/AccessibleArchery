; Export presets — one runnable build per booth platform. The SAME binary
; serves every booth role; the role is chosen at launch with user flags:
;
;   "AccessibleArchery-macos.app/Contents/MacOS/Accessible Archery" -- --station --kiosk
;   AccessibleArchery.exe -- --display
;   AccessibleArchery.exe -- --server
;
; (User flags go after the `--` separator — see scripts/net/role.gd.)
;
; Export from the terminal (templates for this Godot version must be installed):
;   godot --headless --export-release "macOS"   build/AccessibleArchery-macos.app
;   godot --headless --export-release "Windows" build/windows/AccessibleArchery.exe
;
; NOTE: the Voice scheme's out-of-process bridge (tools/voice_bridge.py + the
; models/ folder) is NOT inside the exported pack — copy those two folders next
; to the build on any machine that demos voice control. Every other scheme is
; fully self-contained.

[preset.0]

name="macOS"
platform="macOS"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="models/*,tools/*,booth/*,docs/*"
export_path="build/AccessibleArchery-macos.app"
patches=PackedStringArray()
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

export/distribution_type=1
binary_format/architecture="universal"
codesign/codesign=1
codesign/installer_identity=""
codesign/entitlements/custom_file=""
codesign/entitlements/allow_jit_code_execution=false
codesign/entitlements/allow_unsigned_executable_memory=false
codesign/entitlements/allow_dyld_environment_variables=false
codesign/entitlements/disable_library_validation=false
codesign/entitlements/audio_input=true
codesign/entitlements/address_book=false
codesign/entitlements/calendars=false
codesign/entitlements/camera=false
codesign/entitlements/location=false
codesign/entitlements/photos_library=false
codesign/entitlements/apple_events=false
codesign/entitlements/debugging=false
codesign/entitlements/app_sandbox/enabled=false
notarization/notarization=0
application/icon="res://icon.svg"
application/bundle_identifier="com.crystalspidergames.accessiblearchery"
application/signature=""
application/app_category="games"
application/short_version=""
application/version=""
application/copyright="Crystal Spider Games — MIT"
display/high_res=true

